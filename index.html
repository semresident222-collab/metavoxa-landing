<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MetaVoxa — An institutional ecosystem for surfacing what systems do not see.</title>
    <meta name="description" content="MetaVoxa is an institutional ecosystem built across five rooms: Atrium, Labs, Press, Research, and Founder. Surfacing what systems do not see.">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MetaVoxa",
      "url": "https://metavoxa.com",
      "sameAs": [
        "https://open.substack.com/pub/metavoxa",
        "https://www.linkedin.com/in/martha-koroma-67a28b191",
        "https://www.instagram.com/kwissbae",
        "https://orcid.org/0000-0003-4152-3863",
        "https://www.marthakoroma.com",
        "https://cra.marthakoroma.com",
        "https://github.com/semresident222-collab"
      ],
      "founder": {
        "@type": "Person",
        "name": "Martha Wuya Koroma",
        "url": "https://www.marthakoroma.com"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #0a0a0a;
            --gold-primary: #c9a96e;
            --gold-bright: #d4af37;
            --gold-dim: #8a7350;
            --text-primary: #e8e0d4;
            --text-secondary: #a89b8c;
            --text-muted: #6b5f52;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== INTRO OVERLAY ===== */
        .intro-overlay {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at center, rgba(201, 169, 110, 0.055) 0%, transparent 46%),
                var(--bg-deep);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 1.05s ease, visibility 1.05s ease;
            pointer-events: auto;
        }

        .intro-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-seal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            perspective: 1000px;
            text-align: center;
            padding: 2rem;
        }

        .intro-seal {
            width: clamp(108px, 13vw, 156px);
            height: clamp(108px, 13vw, 156px);
            border-radius: 50%;
            object-fit: cover;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            filter: drop-shadow(0 0 22px rgba(201, 169, 110, 0.22));
            animation: seal-coin-clean 2.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes seal-coin-clean {
            0% {
                opacity: 0;
                transform: scale(3.4) rotateY(-420deg);
                filter: blur(1.8px) drop-shadow(0 0 32px rgba(201, 169, 110, 0.22));
            }
            38% {
                opacity: 1;
                transform: scale(2.1) rotateY(-230deg);
                filter: blur(0.5px) drop-shadow(0 0 28px rgba(201, 169, 110, 0.24));
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
                filter: blur(0) drop-shadow(0 0 18px rgba(201, 169, 110, 0.2));
            }
        }

        .intro-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.35rem, 3.5vw, 2.65rem);
            font-weight: 400;
            letter-spacing: 0.42em;
            color: var(--gold-primary);
            opacity: 0;
            transform: translateY(10px);
            margin-left: 0.42em;
            animation: intro-copy-in 0.85s ease 1.65s forwards;
        }

        .intro-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.95rem, 1.8vw, 1.2rem);
            font-weight: 300;
            color: var(--text-secondary);
            opacity: 0;
            transform: translateY(8px);
            animation: intro-copy-in 0.85s ease 1.95s forwards;
        }

        .intro-tagline em {
            color: var(--text-primary);
            opacity: 0.88;
            letter-spacing: 0.04em;
        }

        @keyframes intro-copy-in {
            to { opacity: 1; transform: translateY(0); }
        }

        .intro-overlay.leaving .intro-seal,
        .intro-overlay.leaving .intro-title,
        .intro-overlay.leaving .intro-tagline {
            animation: intro-soft-out 0.65s ease forwards;
        }

        @keyframes intro-soft-out {
            to { opacity: 0; transform: translateY(-6px) scale(0.985); }
        }

        /* ===== MAIN LANDING ===== */
        .main-landing {
            position: fixed;
            inset: 0;
            opacity: 0;
            transition: opacity 1.25s ease-out;
            overflow: hidden;
            background: var(--bg-deep);
        }

        .main-landing.visible { opacity: 1; }

        /* ===== DESKTOP PANORAMA ===== */
        .panoramic-bg {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            object-position: center;
            z-index: 1;
            user-select: none;
            -webkit-user-drag: none;
        }

        .about-link {
            position: fixed;
            top: clamp(1rem, 3vw, 2.4rem);
            right: clamp(1rem, 3vw, 3rem);
            z-index: 50;
            font-family: 'Cinzel', serif;
            font-size: clamp(0.68rem, 1vw, 0.85rem);
            letter-spacing: 0.32em;
            color: var(--gold-primary);
            text-decoration: none;
            text-transform: uppercase;
            padding: 0.7rem 0.2rem 0.7rem 0.9rem;
            opacity: 0.9;
            transition: color 0.3s ease, opacity 0.3s ease, text-shadow 0.3s ease;
        }

        .about-link::after {
            content: '•';
            margin-left: 0.65rem;
            color: var(--gold-bright);
        }

        .about-link:hover {
            color: var(--gold-bright);
            opacity: 1;
            text-shadow: 0 0 18px rgba(201, 169, 110, 0.35);
        }

        .doors-overlay {
            position: fixed;
            left: 0;
            right: 0;
            top: 16.5vh;
            bottom: 9.5vh;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        .door-zone {
            flex: 1;
            position: relative;
            text-decoration: none;
            pointer-events: auto;
            cursor: pointer;
            background: transparent;
            overflow: hidden;
            isolation: isolate;
        }

        /*
          Integrated hover: no borders, no obvious rectangle.
          It behaves like a soft light passing over the door image.
        */
        .door-zone::before {
            content: '';
            position: absolute;
            inset: -8% -3%;
            opacity: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 54% 72% at 50% 62%,
                    rgba(212, 175, 55, 0.20) 0%,
                    rgba(201, 169, 110, 0.12) 24%,
                    rgba(201, 169, 110, 0.045) 47%,
                    transparent 72%),
                linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 229, 174, 0.035) 42%,
                    rgba(255, 229, 174, 0.075) 50%,
                    rgba(255, 229, 174, 0.035) 58%,
                    transparent 100%);
            mix-blend-mode: screen;
            filter: blur(9px);
            transform: scale(0.84, 0.92);
            transition:
                opacity 0.42s ease,
                transform 0.58s cubic-bezier(0.23, 1, 0.32, 1),
                filter 0.42s ease;
            -webkit-mask-image: radial-gradient(ellipse 55% 78% at 50% 58%, #000 0%, #000 47%, transparent 76%);
            mask-image: radial-gradient(ellipse 55% 78% at 50% 58%, #000 0%, #000 47%, transparent 76%);
        }

        .door-zone:hover::before {
            opacity: 1;
            transform: scale(1, 1);
            filter: blur(7px);
        }

        /* ===== MOBILE 3D CAROUSEL ===== */
        .carousel-section {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10;
            overflow: hidden;
            background:
                radial-gradient(circle at center, rgba(201, 169, 110, 0.07) 0%, transparent 58%),
                var(--bg-deep);
            perspective: 1200px;
            touch-action: pan-y;
        }

        .carousel-stage {
            position: absolute;
            inset: 0;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .carousel-slide {
            position: absolute;
            top: 13vh;
            left: 11vw;
            width: 78vw;
            height: 76vh;
            border-radius: 0;
            overflow: hidden;
            text-decoration: none;
            box-shadow: 0 18px 55px rgba(0, 0, 0, 0.58);
            transform-style: preserve-3d;
            transition:
                transform 0.75s cubic-bezier(0.23, 1, 0.32, 1),
                opacity 0.75s ease,
                filter 0.75s ease;
            will-change: transform, opacity, filter;
            background: #111;
        }

        .carousel-slide-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        .carousel-indicators {
            position: fixed;
            bottom: 1.3rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 0.58rem;
            z-index: 30;
        }

        .carousel-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            opacity: 0.55;
        }

        .carousel-dot.active {
            width: 20px;
            border-radius: 99px;
            background: var(--gold-primary);
            opacity: 1;
            box-shadow: 0 0 12px rgba(201, 169, 110, 0.45);
        }

        .carousel-hint {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 2.9rem;
            z-index: 30;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 0.58rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold-dim);
            opacity: 0.75;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .panoramic-bg,
            .doors-overlay {
                display: none;
            }

            .carousel-section {
                display: block;
            }

            .about-link {
                z-index: 80;
                top: 0.9rem;
                right: 0.8rem;
                font-size: 0.68rem;
                letter-spacing: 0.24em;
                padding: 0.8rem 0.1rem 0.8rem 0.8rem;
            }

            .intro-seal {
                width: 124px;
                height: 124px;
            }

            .intro-title {
                font-size: 1.5rem;
                letter-spacing: 0.28em;
                margin-left: 0.28em;
            }

            .intro-tagline {
                max-width: 280px;
                line-height: 1.45;
            }
        }

        @media (max-width: 420px) {
            .carousel-slide {
                top: 14vh;
                left: 9vw;
                width: 82vw;
                height: 74vh;
            }
        }

        @media (min-width: 769px) {
            .carousel-section { display: none !important; }
        }

        @media (prefers-reduced-motion: reduce) {
            .intro-overlay { display: none; }
            .main-landing { opacity: 1; }
            .carousel-slide { transition: none; }
        }
    </style>
</head>

<body>

    <!-- INTRO OVERLAY -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-seal-container">
            <img src="seal.jpg" alt="MetaVoxa Wax Seal" class="intro-seal" id="introSeal">
            <h1 class="intro-title">METAVOXA</h1>
            <p class="intro-tagline">An institutional ecosystem for surfacing<br><em>what systems do not see.</em></p>
        </div>
    </div>

    <!-- MAIN LANDING -->
    <main class="main-landing" id="mainLanding">
        <a href="about.html" class="about-link" aria-label="About MetaVoxa">About</a>

        <!-- DESKTOP: FULL FIVE-DOOR IMAGE -->
        <img src="all-five.jpg" alt="MetaVoxa — Five Rooms" class="panoramic-bg" id="panoramicBg">

        <nav class="doors-overlay" id="doorsOverlay" aria-label="MetaVoxa rooms">
            <a href="https://atrium.metavoxa.com" class="door-zone" aria-label="Enter Atrium"></a>
            <a href="https://labs.metavoxa.com" class="door-zone" aria-label="Enter Labs"></a>
            <a href="https://press.metavoxa.com" class="door-zone" aria-label="Enter Press"></a>
            <a href="https://research.metavoxa.com" class="door-zone" aria-label="Enter Research"></a>
            <a href="https://www.marthakoroma.com" class="door-zone" aria-label="Meet the Founder"></a>
        </nav>

        <!-- MOBILE: ROUND / ROTATING CAROUSEL -->
        <section class="carousel-section" id="carouselSection" aria-label="MetaVoxa carousel">
            <div class="carousel-stage" id="carouselStage">
                <a href="https://atrium.metavoxa.com" class="carousel-slide" aria-label="Enter Atrium">
                    <img src="atrium.jpg" alt="Atrium" class="carousel-slide-bg">
                </a>
                <a href="https://labs.metavoxa.com" class="carousel-slide" aria-label="Enter Labs">
                    <img src="labs.jpg" alt="Labs" class="carousel-slide-bg">
                </a>
                <a href="https://press.metavoxa.com" class="carousel-slide" aria-label="Enter Press">
                    <img src="press.jpg" alt="Press" class="carousel-slide-bg">
                </a>
                <a href="https://research.metavoxa.com" class="carousel-slide" aria-label="Enter Research">
                    <img src="research.jpg" alt="Research" class="carousel-slide-bg">
                </a>
                <a href="https://www.marthakoroma.com" class="carousel-slide" aria-label="Meet the Founder">
                    <img src="founder.jpg" alt="Founder" class="carousel-slide-bg">
                </a>
            </div>

            <div class="carousel-hint">Swipe to rotate</div>
            <div class="carousel-indicators" id="carouselIndicators"></div>
        </section>
    </main>

    <script>
        // ===== INTRO: coin zooms out, spins, text appears, then landing fades in =====
        const introOverlay = document.getElementById('introOverlay');
        const mainLanding = document.getElementById('mainLanding');

        function endIntro() {
            introOverlay.classList.add('leaving');

            setTimeout(() => {
                introOverlay.classList.add('hidden');
                mainLanding.classList.add('visible');
            }, 820);
        }

        window.addEventListener('load', () => {
            setTimeout(endIntro, 4300);
        });

        // ===== MOBILE 3D CAROUSEL =====
        const carouselSection = document.getElementById('carouselSection');
        const slides = Array.from(document.querySelectorAll('.carousel-slide'));
        const indicatorsContainer = document.getElementById('carouselIndicators');
        const totalSlides = slides.length;

        let currentIndex = 0;
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let didMove = false;
        let autoRotateInterval = null;

        slides.forEach((_, i) => {
            const dot = document.createElement('button');
            dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
            dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
            dot.addEventListener('click', () => {
                stopAutoRotate();
                goToSlide(i);
                startAutoRotate();
            });
            indicatorsContainer.appendChild(dot);
        });

        const dots = Array.from(document.querySelectorAll('.carousel-dot'));

        function wrapOffset(index, activeIndex) {
            let offset = index - activeIndex;
            const half = Math.floor(totalSlides / 2);

            if (offset > half) offset -= totalSlides;
            if (offset < -half) offset += totalSlides;

            return offset;
        }

        function updateCarousel() {
            slides.forEach((slide, i) => {
                const offset = wrapOffset(i, currentIndex);
                const abs = Math.abs(offset);

                slide.style.pointerEvents = abs === 0 ? 'auto' : 'none';

                if (abs === 0) {
                    slide.style.opacity = '1';
                    slide.style.filter = 'brightness(1) saturate(1)';
                    slide.style.zIndex = '20';
                    slide.style.transform = 'translateX(0) translateZ(0) rotateY(0deg) scale(1)';
                } else if (abs === 1) {
                    const direction = offset > 0 ? 1 : -1;
                    slide.style.opacity = '0.48';
                    slide.style.filter = 'brightness(0.58) saturate(0.72)';
                    slide.style.zIndex = '10';
                    slide.style.transform = `translateX(${direction * 58}vw) translateZ(-170px) rotateY(${direction * -28}deg) scale(0.86)`;
                } else {
                    const direction = offset > 0 ? 1 : -1;
                    slide.style.opacity = '0';
                    slide.style.filter = 'brightness(0.4) saturate(0.5)';
                    slide.style.zIndex = '1';
                    slide.style.transform = `translateX(${direction * 92}vw) translateZ(-320px) rotateY(${direction * -40}deg) scale(0.72)`;
                }
            });

            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        }

        function goToSlide(index) {
            currentIndex = (index + totalSlides) % totalSlides;
            updateCarousel();
        }

        function nextSlide() {
            goToSlide(currentIndex + 1);
        }

        function prevSlide() {
            goToSlide(currentIndex - 1);
        }

        function startAutoRotate() {
            if (window.innerWidth > 768) return;
            stopAutoRotate();
            autoRotateInterval = setInterval(nextSlide, 4200);
        }

        function stopAutoRotate() {
            if (autoRotateInterval) clearInterval(autoRotateInterval);
            autoRotateInterval = null;
        }

        function pointerStart(x, y) {
            isDragging = true;
            didMove = false;
            startX = x;
            startY = y;
            stopAutoRotate();
        }

        function pointerMove(x, y) {
            if (!isDragging) return;

            const dx = x - startX;
            const dy = y - startY;

            if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy)) {
                didMove = true;
            }
        }

        function pointerEnd(x) {
            if (!isDragging) return;

            const dx = x - startX;

            if (didMove) {
                if (dx < -38) nextSlide();
                if (dx > 38) prevSlide();
            }

            isDragging = false;
            startAutoRotate();
        }

        carouselSection.addEventListener('touchstart', (e) => {
            pointerStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        carouselSection.addEventListener('touchmove', (e) => {
            pointerMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        carouselSection.addEventListener('touchend', (e) => {
            const x = e.changedTouches[0] ? e.changedTouches[0].clientX : startX;
            pointerEnd(x);
        }, { passive: true });

        carouselSection.addEventListener('mousedown', (e) => {
            pointerStart(e.clientX, e.clientY);
        });

        carouselSection.addEventListener('mousemove', (e) => {
            pointerMove(e.clientX, e.clientY);
        });

        carouselSection.addEventListener('mouseup', (e) => {
            pointerEnd(e.clientX);
        });

        carouselSection.addEventListener('mouseleave', () => {
            if (isDragging) {
                isDragging = false;
                startAutoRotate();
            }
        });

        slides.forEach(slide => {
            slide.addEventListener('click', (e) => {
                if (didMove) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            });
        });

        window.addEventListener('resize', () => {
            updateCarousel();
            if (window.innerWidth <= 768) startAutoRotate();
            else stopAutoRotate();
        });

        updateCarousel();
        startAutoRotate();
    </script>

</body>
</html>
